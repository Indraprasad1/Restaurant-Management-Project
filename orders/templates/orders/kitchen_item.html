{% extends 'orders/base.html' %}

{% block title %}
Kitchen Dashboard
{% endblock %}

{% block heading %}
Kitchen Dashboard
{% endblock %}


{% block main_content %}
<div class="flex justify-center">
    <section class="lg:w-[50%]  bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">

        <!-- Station Header -->
        <div class="px-5 py-4 bg-slate-900 text-white flex items-center justify-between">
            <h2 class="font-bold text-lg">
                Update Order Item Status
            </h2>

        </div>

        <div class="p-4">
            <h1 class="text-2xl my-2">Update status of {{ order_item }}</h1>
            <hr>
            <div class=" flex gap-3 items-center mt-3">
                <form action="" method="post">
                    {% csrf_token %}
                    <input type="hidden" name="order_id" value="{{order_item.id}}">
                    <input type="hidden" name="status" value="ready">
                    <button class="py-2 px-3 bg-green-500 rounded-lg text-gray-50 font-semibold hover:bg-green-700"
                        type="submit">Ready</button>
                </form>
                <form action="" method="post">
                    {% csrf_token %}
                    <input type="hidden" name="order_id" value="{{order_item.id}}">
                    <input type="hidden" name="status" value="cancel">
                    <button class="py-2 px-3 bg-red-500 rounded-lg text-gray-50 font-semibold hover:bg-red-700"
                        type="submit">Cancel</button>
                </form>
            </div>
        </div>

    </section>


</div>
{% endblock %}
